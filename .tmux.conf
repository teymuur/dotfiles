set -g prefix `
bind ` send-prefix

# use zsh isntead
set-option -g default-shell /bin/zsh
set-option -g bell-action none
# Allow opening multiple terminals to view the same session at different sizes.
setw -g aggressive-resize on

# Remove delay when switching between Vim modes.
set -sg escape-time 0

# Allow Vim's FocusGained to work when your terminal gains focus.
#   Requires Vim plugin: https://github.com/tmux-plugins/vim-tmux-focus-events
set -g focus-events on

# Add a bit more scroll history in the buffer.
set -g history-limit 50000

# Enable color support inside of tmux.
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",*256col*:Tc"
# Send xterm compatible control arrow keys so they work with Vim.
setw -g xterm-keys on

# Ensure window index numbers get reordered on delete.
set-option -g renumber-windows on
# Start windows and panes index at 1, not 0.
set -g base-index 1
setw -g pane-base-index 1
# clock mode
setw -g clock-mode-colour red

# panes
set -g pane-border-style 'fg=red'
set -g pane-active-border-style 'fg=yellow'

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=red bg=black'

set -g status-left ''
set -g status-left-length 10

set -g status-right-style 'fg=white'
set -g status-right ' #[bg=red] %Y-%m-%d %H:%M '
set -g status-right-length 50

setw -g window-status-current-style 'fg=black bg=red bold'
setw -g window-status-current-format ' #I #[fg=white]#W '

setw -g window-status-style 'fg=red bg=black'
setw -g window-status-format ' #I #[fg=white]#W '

setw -g window-status-bell-style 'fg=yellow bg=red bold'

# messages
set -g message-style 'fg=yellow bg=red bold'


set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[3 q'
# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf

# List of plugin
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-yank'
  set -g status-style "bg=#282a36,fg=#f8f8f2"      
  set -g status-left "#[bg=#bd93f9,fg=#282a36,bold] #S #[bg=#282a36,fg=#bd93f9]"                       
  set -g status-right "#[fg=#6272a4]#[bg=#6272a4,fg=#f8f8f2] %H:%M #[bg=#bd93f9,fg=#282a36,bold] #H "  
  set -g window-status-format "#[fg=#6272a4] #I:#W "                                                   
  set -g window-status-current-format "#[bg=#44475a,fg=#bd93f9,bold] #I:#W "                           
  set -g pane-border-style "fg=#44475a"            
  set -g pane-active-border-style "fg=#bd93f9"     
  set -g message-style "bg=#44475a,fg=#f8f8f2"     

set -g @continuum-restore 'on'
